name: Send WhatsApp Message

on:
  schedule:
    - cron: '0 3 * * *'   # 8:30 AM IST
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Twilio
        run: pip install twilio

      - name: Run Script
        env:
          SID: ${{ secrets.SID }}
          TOKEN: ${{ secrets.TOKEN }}
        run: python send_message.py